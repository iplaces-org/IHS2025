const MEETING_NOTES = {"Nils Gilman|Island Earth: Governing in the Planetary Age": "Key Arguments: Two ideas from the 1640s still constrain us: (1) human exceptionalism, (2) Westphalian sovereignty. Both undermined: machines exhibit thought; animals show intentionality. 'Global' = human flows; 'Planetary' = phenomena humans perturb but don't control.\\n\\nSolutions: Planetary subsidiarity; networked translocal governance (C40 model); functional planetary institutions (IAEA precedent); multi-species flourishing via technology.\\n\\nDiscussion: Bailey asked how supranational agencies emerge. Gilman: 75-90% compliance transformative; segmented sovereignty; crises drive change.\\n\\nACTION: Explore Moorea/FP as model for planetary subsidiarity.", "Hervé Bossin|Innovative Approaches to Vector-Borne Disease": "ILM: 76 years. 15 mosquito species in FP; 6 endemic, 3 invasive. Aedes aegypti: 1904→1986 all archipelagos. Threats: dengue, Zika, chikungunya, filariasis, avian malaria (Monarch of Fatu Hiva).\\n\\nSIT: Industrial facility Tahiti. PacSIT (WHO): Tetiaroa April 2025, Papara Nov 2025, Cook Islands next. The Brando: premium for mosquito-free. Previous elimination on Tuamotu atoll.\\n\\nACTION: Economists for SIT cost modeling. Hawaii avian malaria collaboration.", "Mayalen Zubia|Exploring Tropical Seaweed Diversity for a Sustainable Bioeconomy": "~531 species. 95% funding on temperate, <5% tropical. >1,000 DNA sequences; herbarium >5,000 specimens. Cultural: ho'opono pono, traditional medicine.\\n\\nNOT low-value phycocolloids. Instead: Turbinaria alginates (biomedical), >50 edible species, bioactives, biorefinery. REMU (2024-2028): ethnobiology, nutrition, health risks. Asparagopsis for methane. RIP BIOFENUA antibacterial/antifouling.\\n\\nACTION: Spore banking. Sanitary assessments. Innovation funding.", "Adrienne Correa|Te Ora Fenua | Te Mauri Ora (BioCode 2.0 / EthnoCode)": "BioCode 2.0: draft genomes 6-30 organisms with microbiome/virome. Schools/communities FIRST. 'Rori' sea cucumber model. Lessons: translator funding, in-person meetings, cultural components, iterative consent. Anderson on Local Contexts.\\n\\nACTION: Local Contexts labels. Materials in French/Tahitian.", "Cristian Monaco & Guillaume Mitta|Blue Food Systems: Advancing Tropical Oyster Farming": "80% food imported; >50% emissions from transport. Three low-trophic: algae, bivalves, cucumbers. Two native oysters, hatchery optimized, 16 months commercial. Solar-tide vs Polydora. Carbon controversy: individual CO2 release vs community-level sequestration.\\n\\nACTION: Research community-level carbon sequestration.", "Tamatoa Bambridge|Zone Atelier FP Long-Term Social-Ecological Research": "Took 2 years; previous attempts failed. ~100-150 researchers in FP. 'S' (social) key differentiator. Covers entire EEZ. Co-designing with non-academic communities essential.\\n\\nACTION: Build network across FP.", "Simon Ducatez|Towards a Strategy to Reduce Biodiversity Loss in FP": "14 extinct endemics (8.5% global). 15/26 endemic birds EN/CR. Aichi failed. No measurable FP framework. Prioritize: impact × importance × feasibility. Avoid 'green colonialism.'\\n\\nACTION: Measurable objectives. Recovery plans with communities.", "Craig Montell|Eliminating Mosquito-Borne Disease": "trpVa: deaf males 0% fertilization. Paradox: blind males outcompete wild-type. IR007: 3 EPA components, >12h (DEET ~4.5h), <$0.14/oz, safe. VectorFree co-founded.\\n\\nACTION: Montell-Bossin collaboration on engineered males.", "Tamatoa Bambridge & Simon Ducatez|Land-Sea Resilience": "4,500 km coastline, 124 islands. Workshop: 50+6, 27 talks, 3 roundtables. 39 programs, 11 databases, 35 actors. COCOPOL: 5 WPs, ~€2M, 5-8yr, >30 researchers.\\n\\nACTION: France-Berkeley Fund. Proceedings. Integrate DAG/Santé.", "Thierry Lison de Loma|Transforming Island Food Systems by 2030": "5-10yr aligned with SDA FP. Schools + tourism targets. BioPasifika, short circuits, cultural landscape. Full value chain. Participatory democracy; iPlaces data sovereignty.\\n\\nACTION: Timeline/milestones. Pilot islands.", "Thiago Correa|Energy: Decarbonizing FP Using Seaweed": "~350M liters fossil fuels. Seaweed ethanol ~10% substitution. No land competition or freshwater.\\n\\nACTION: Connect with Zubia cultivation and Scolari LCA.", "John Coates|International Bioeconomy & Macroalgae Center": "IBMC: macroalgae center. Indonesia world leader. Upstream→downstream biorefinery. Seaweed as FP circular bioeconomy feedstock.", "Mere Takoko|Blue Natural Capital": "Blue natural capital via whales. Nutrient cycling, carbon sequestration. Rights/personhood governance. Connects to Gilman's multi-species flourishing.", "David Scolari|Life Cycle Assessment: Biofuel from Macroalgae in FP": "Fossil: ~92-97 gCO2e/MJ. Renewables cut conversion 90%+. Co-products displace carbon-intense imports. Co-locate with renewables.\\n\\nACTION: Complete FP-specific LCA.", "Nigel Bradly|Blue Bioeconomy in Aotearoa New Zealand": "Model: Origination→Venture→Catalytic Investment→PoC→Scale. Save Our Scallops with Iwi. ORA Reefs: kina removal, reseeding, artificial reefs. Blue Nature Aotearoa mentorship.\\n\\nACTION: FP-NZ collaboration.", "Jenny Kahn|Taro and Carbon Sequestration": "Archaeological perspective. Traditional taro-marine relationship. Polynesian land management = productive, resilient food systems with climate co-benefits.", "Hannah Stewart|Land-Sea Restoration: Coral": "Coral Gardeners Moorea. Community-driven reef rehabilitation with livelihoods and tourism.", "Cedrik Lo|Marine Resources and Island Innovation": "Government fisheries management and innovation. Policy-bioeconomy connection.", "Adrien Conte|Blue Carbon Market Standards": "Blue carbon frameworks. Financing mechanism for island sustainability.\\n\\nACTION: Evaluate FP mangroves, seagrass, aquaculture potential.", "David Zilberman|Bioeconomy, Innovation, & Environmental Leadership": "Bio = resources + tech + sustainability. Types: biotech, resource, blue, circular, green. Supply chain thinking: innovation SC + product SC + circularity.\\n\\nMoorea: seaweed nutrient capture, algae wastewater, food waste conversion, local fertilizer, macroalgae breeding. Blue innovation hub.\\n\\nACTION: Supply chain framework per mission.", "Kawika Winter|Biocultural Restoration, Stewardship, and Governance": "Social-ecological restoration. He'eia NERR. Ecomimicry: 8 strategies. Loko i'a: habitat engineering + trophic management = āina momona. Mountain-to-sea approach. CBSFAs with community rules. Imu increase abundance/biomass/richness.\\n\\nACTION: NERR model for Moorea/Tetiaroa.", "Ali Hill|Social License to Operate: California's Seaweed Industry": "Pyramid: Rejection→Tolerance→Support→Endorsement. CA barriers: CEQA (64% NIMBY lawsuits), environment, community. Socialize→Listen→Integrate→Reflect.\\n\\nACTION: SLO for FP seaweed from outset.", "Jane Anderson|Rights and Representation, Including More Than Human": "Non-human rights frameworks. Local Contexts: TK/Biocultural Labels. Connection to BioCode 2.0.\\n\\nACTION: Continue Labels for FP.", "Mere Takoko|Whales: From Personhood to Indigenous Governance": "Legal personhood for whales. Indigenous governance models. Moananui initiative.", "Benoit Stoll & Tobias Fischer|Mapping Research Outputs: The Tetiaroa Use Case": "New: dGPS, multispectral drone, tide gauge. 1955-2025 imagery. 10/13 motu stable. Dynamic: Motu One gone, Tahuna Rahi at risk. Fischer ML: XGBoost + transfer learning. IRD Innovation nominee.\\n\\nTahuna iti: shift→vegetation gradient→bird biodiversity. 'Exceptional biodiversity from dynamics that will cause disappearance.'\\n\\nACTION: Pipeline across FP atolls.", "John Marchioni|Documenting Research Compliance": "BBNJ SBI requirement. Trust is local. Four user types. Sealed envelopes: identifiers, access, intentions. Tamper-detected. Measure by counting envelopes/relying parties.\\n\\nACTION: Evaluate for iPlaces.", "Warren Essey|Accelerating Research to Education Translation": "Kudu: instructor→AI draft→corrections→iteration (NOT generic). UCLA first AI course. KAI: Q&A now, complex feedback/real-time content/custom apps future. Researchers→AI→students loop.\\n\\nACTION: Kudu for Ocean ELP.", "Dave Vieglais|iPlace(s) Data Trust: A Place-Based Research Platform": "Contextual collapse problem. Workflow: submit→review→consent→DOI→permits→tracking→dashboards. Multilingual, AI-ready. P0 PoC (Nov 2025)→P1 MVP→P2 start-up→P3 scale (2027).\\n\\nACTION: Gump pilot.", "Hinano Murphy|Atitia Center — 20 Years of Culture & Education": "Land adjacent to Gump. Elders wanted traditional knowledge space. UC Berkeley agreement. Trust took 5 years: Tahitian language bridge, transparency, family integration. 'Ite deodora' — knowledge must be lived.", "Alex Kusenko|Measuring AI & Math Interventions with Kudu": "UCLA/UCSD independent validation. Improved engagement and outcomes for students lacking background.", "Vainui Marakai|Educational Marine Areas (AME)": "29 zones, 31 schools, 2,500+ students, 4 archipelagos. Know/Live/Transmit. Holistic. Children's sea councils. Since 2016: France 1,500+ areas, 200,000+ students. Consolidation phase.\\n\\nACTION: Connect EMA with iPlaces.", "Ali Hill|Workforce Development: Lessons from California's Central Valley": "Baby carrot: stagnant+waste→innovation→peak. Circularity revenue from waste. IBMC: place-based, people-based, circular, socially sustainable.\\n\\nACTION: Baby carrot thinking for seaweed.", "Tchiou, White Davies & Lison de Loma|Ocean Environmental Leadership Program (Ocean ELP)": "Gap: no Pacific ocean program. Mid-career leaders. Moorea: Gump, CRIOBE, LTER, TEK. 10-14 days, 30 participants. South-South learning. Premium: tuition+donors+Pacific scholarships.\\n\\nACTION: Curriculum and funding. Engage Beahrs alumni.", "Lolo Kleykamp|Measuring Impact: A Funder's Perspective": "SCF: inequality through entrepreneurship. ToC: inputs→activities→outputs→outcomes→impact. 'Promise outputs, not outcomes—but outcomes matter.' Workshop: ToC per mission.\\n\\nACTION: Each team complete ToC. Template for all proposals.", "Stanley Rowland & Frank Murphy|Tetiaroa CASUP: The First 10 Years": "Remote presentation. Three pillars. Surveys: French 11 (community) vs English 29 (funding/enforcement). Key gaps. CASUP 2.0: PRESERVE/INTEGRATE/FILL GAPS.\\n\\nACTION: Address local/international priority gaps.", "Tj Tate|Tetiaroa CASUP 2.0: The Next 10 Years": "Committee: Rowland/Tate, Murphy, Davies, Sage, Gaspar. Review→assess→survey→timeline.\\n\\nACTION: Work plan from survey. CASUP-2 Committee afternoon.", "Alex Wegmann|Palmyra": "Palmyra Atoll TNC. Comparative perspective in remote uninhabited setting.", "Jean Wencélius & Tamatoa Bambridge|Moorea & Tahiti Tereheamanu": "Southern Tahiti. Pilot 2025, scientific committee, citizen consultation April 2025. Needs: water, addictions, medicine, energy, health, food. Layout: heritage, transport, hub, hazards, land. Employment: agriculture, industry, training, tourism, family.\\n\\nACTION: Action plan with socio-ecological research.", "Megan Donahue & Michael Bruno|Hawai'i": "HIMB/Coconut Island. Poor tracking. Projects static. Trust varies (NCBI>BCO-DMO>collaborators). PI data explosion. Stations managing data? No. AI? Information manager aspirational.\\n\\nACTION: Automated tracking.", "Alex Mawyer|4Site: From Transects to Knowledge Transects": "Knowledge transects: observations/models/practices across islands. FAIR+CARE, anchored in place/history/power. Ridge-to-reef, island-to-archipelago. Engines of collective intelligence. Vision: 4Site→N-Site, stations as planetary sapience neurons.\\n\\nACTION: Minimum standards. Visualization tools.", "Richard Bailey|Honu Submarine International Sea Station Tahiti": "Two HOVs rated 1,200m. Mobile deep ocean platform. Democratizing mesopelagic access. Fraction of traditional cost.\\n\\nACTION: Feasibility study and partnerships.", "Hinano Murphy|Voice of the Ocean": "Indigenous Polynesian ocean stewardship. Cultural/spiritual connections to sea.", "Mere Takoko|Moananui: Indigenous-Led Marine Sanctuaries": "Indigenous governance rooted in traditional stewardship. Alternatives to state-imposed regimes.", "Hetereki Huke|Traditional Council Rapa Nui": "Te Mau Hatu o Rapa Nui: pre-contact through colonization to contemporary sovereignty reclamation. Repatriation issues (British Museum).", "Mary Therese Hattori|Pacific Islands Development Program": "PIDP since 1980. CROP (9 entities). PICL secretariat (20 entities incl. FP). Capacity building, gender equality, youth.\\n\\nACTION: Connect IH&S with PIDP/PICL networks.", "Bambridge, D'Arcy, Lilford, Mawyer & Wencélius|Mapping Indigenous Seas": "WDPA: 6 points, 114 km². Actual: 252 features, 27,413 km². Zones: ZPR/rahui, DIREN, UNESCO, leases, holothurie. Three problems: jurisdictional overlap, land-sea overlap, illegibility. Structural invisibility. Epistemic shift needed.\\n\\nACTION: Map all FP areas. Update WDPA. Methodology for fluid governance."};

function NetworkGraph() {
  var svgRef = React.useRef(null);
  React.useEffect(function() {
    if (!svgRef.current || typeof d3 === 'undefined') return;
    var svg = d3.select(svgRef.current);
    svg.selectAll("*").remove();
    var width = 860, height = 500;
    
    // Build nodes from connections
    var nodeMap = {};
    GRAPH_CONNECTIONS.forEach(function(c) {
      if (!nodeMap[c.from]) nodeMap[c.from] = {id: c.from, count: 0};
      if (!nodeMap[c.to]) nodeMap[c.to] = {id: c.to, count: 0};
      nodeMap[c.from].count++;
      nodeMap[c.to].count++;
    });
    var nodes = Object.values(nodeMap);
    var links = GRAPH_CONNECTIONS.map(function(c) { return {source: c.from, target: c.to, theme: c.theme, strength: c.strength}; });

    var simulation = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(links).id(function(d){return d.id}).distance(120))
      .force("charge", d3.forceManyBody().strength(-300))
      .force("center", d3.forceCenter(width/2, height/2))
      .force("collision", d3.forceCollide(30));

    var g = svg.append("g");

    // Zoom
    svg.call(d3.zoom().scaleExtent([0.3, 3]).on("zoom", function(e) { g.attr("transform", e.transform); }));

    var link = g.selectAll("line").data(links).join("line")
      .attr("stroke", "#1ABFB044").attr("stroke-width", function(d){return d.strength});

    var node = g.selectAll("g.node").data(nodes).join("g").attr("class", "node")
      .call(d3.drag().on("start",function(e,d){if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
        .on("drag",function(e,d){d.fx=e.x;d.fy=e.y}).on("end",function(e,d){if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null}));

    node.append("circle").attr("r", function(d){return 6+d.count*2}).attr("fill", "#1ABFB0").attr("stroke","#0B1628").attr("stroke-width",2);
    node.append("text").text(function(d){return d.id.split(" ")[d.id.split(" ").length-1]})
      .attr("dx", 12).attr("dy", 4).attr("fill","#C8D8E8").attr("font-size","10px").attr("font-family","'DM Sans', sans-serif");

    // Tooltip
    var tooltip = svg.append("g").attr("class","tooltip").style("display","none");
    tooltip.append("rect").attr("rx",6).attr("fill","#132B4A").attr("stroke","#1ABFB044");
    tooltip.append("text").attr("fill","#F0EDE6").attr("font-size","11px").attr("font-family","'DM Sans', sans-serif");

    node.on("mouseover", function(e, d) {
      var connected = links.filter(function(l){return l.source.id===d.id||l.target.id===d.id});
      var themes = connected.map(function(l){return l.theme}).join(", ");
      link.attr("stroke", function(l){return (l.source.id===d.id||l.target.id===d.id) ? "#3EEADB" : "#1ABFB012"})
        .attr("stroke-width", function(l){return (l.source.id===d.id||l.target.id===d.id) ? l.strength+1 : 0.5});
      d3.select(this).select("circle").attr("fill","#3EEADB").attr("r", 8+d.count*2);
      tooltip.style("display",null);
      tooltip.select("text").text(d.id + " — " + themes).attr("x",8).attr("y",16);
      var bb = tooltip.select("text").node().getBBox();
      tooltip.select("rect").attr("width",bb.width+16).attr("height",bb.height+10).attr("y",2);
