var N={"Nils Gilman|Island Earth: Governing in the Planetary Age":"Key Arguments: (1) human exceptionalism and (2) Westphalian sovereignty both failing. Solutions: planetary subsidiarity; translocal networks (C40); functional institutions (IAEA precedent); multi-species flourishing.\n\nDiscussion: Bailey asked how supranational agencies emerge. Gilman: 75\u201390% compliance transformative; crises drive change.\n\nACTION: Explore Moorea/FP as model for planetary subsidiarity.","Herv\u00e9 Bossin|Innovative Approaches to Vector-Borne Disease":"ILM 76 years. 15 species, 3 invasive cause all disease. SIT industrial facility. PacSIT (WHO): Tetiaroa April 2025, Papara Nov 2025, Cook Islands next. The Brando: premium for mosquito-free.\n\nACTION: Economists for SIT cost modeling.\nACTION: Hawaii avian malaria collaboration.","Mayalen Zubia|Exploring Tropical Seaweed Diversity":"531 species: 320 red, 119 green, 92 brown. 95% funding temperate. >1,000 DNA sequences; herbarium >5,000. Cultural: ho\u2019opono pono. NOT phycocolloids \u2014 Turbinaria alginates, >50 edible species, bioactives, biorefinery. REMU (2024\u20132028). Asparagopsis for methane.\n\nACTION: Spore banking.\nACTION: Sanitary assessments.\nACTION: Innovation funding.","Adrienne Correa|Te Ora Fenua | Te Mauri Ora":"BioCode 2.0: draft genomes 6\u201330 organisms. Schools/communities FIRST. \u2018Rori\u2019 sea cucumber model. Lessons: translator funding, iterative consent.\n\nACTION: Local Contexts labels.\nACTION: Materials in French/Tahitian.","Cristian Monaco & Guillaume Mitta|Advancing Tropical Oyster Farming":"80% food imported; >50% emissions from transport. Two native oysters, 16 months commercial. Solar-tide vs Polydora. Carbon: individual CO\u2082 vs community sequestration.\n\nACTION: Research community-level carbon sequestration.","Tamatoa Bambridge|Zone Atelier FP":"Took 2 years; previous attempts failed. ~100\u2013150 researchers. \u2018S\u2019 (social) key. Covers entire EEZ. Co-designing essential.\n\nACTION: Build network across FP.","Simon Ducatez|Biodiversity Strategy for FP":"14 extinct endemics (8.5% global). 15/26 endemic birds EN/CR. Aichi failed. No measurable FP framework. Prioritize: impact \u00d7 importance \u00d7 feasibility.\n\nACTION: Measurable objectives.\nACTION: Recovery plans with communities.","Craig Montell|Eliminating Mosquito-Borne Disease":"trpVa: deaf males 0% fertilization. Blind males outcompete wild-type. IR007: 3 EPA components, >12h (DEET ~4.5h), <$0.14/oz. VectorFree.\n\nACTION: Montell-Bossin collaboration.","Tamatoa Bambridge & Simon Ducatez|Land-Sea Resilience":"4,500 km coastline, 124 islands. Workshop: 50+6, 27 presentations. 39 programs, 11 databases, 35 actors. COCOPOL: ~\u20ac2M, 5\u20138yr, >30 researchers.\n\nACTION: France-Berkeley Fund.\nACTION: Complete proceedings.","Thierry Lison de Loma|Transforming Island Food Systems by 2030":"5\u201310yr. Schools + tourism. BioPasifika. Full value chain. Participatory democracy via iPlaces.\n\nACTION: Mission timeline.\nACTION: Identify pilot islands.","Thiago Correa|Decarbonizing FP Using Seaweed":"~350M liters fossil fuels. Ethanol ~10% substitution.\n\nACTION: Connect with Zubia and Scolari.","John Coates|International Bioeconomy & Macroalgae Center":"IBMC vision. Indonesia model. Seaweed as circular bioeconomy feedstock.","Mere Takoko|Blue Natural Capital":"Blue natural capital via whales. Nutrient cycling, carbon sequestration. Rights/personhood governance.","David Scolari|Life Cycle Assessment: Biofuel from Macroalgae":"Fossil: ~92\u201397 gCO\u2082e/MJ. Renewables cut conversion 90%+. Co-products displace imports.\n\nACTION: Complete FP-specific LCA.","Nigel Bradly|Blue Bioeconomy in Aotearoa New Zealand":"Origination to Scale. Save Our Scallops with Iwi. ORA Reefs. Blue Nature Aotearoa.\n\nACTION: FP-NZ collaboration.","Jenny Kahn|Taro and Carbon Sequestration":"Traditional taro-marine relationship. Resilient food with climate co-benefits.","Hannah Stewart|Land-Sea Restoration: Coral":"Coral Gardeners Moorea. Community-driven restoration.","Cedrik Lo|Marine Resources and Island Innovation":"Government fisheries. Policy-bioeconomy connection.","Adrien Conte|Blue Carbon Market Standards":"Blue carbon frameworks. Financing for sustainability.\n\nACTION: Evaluate FP ecosystems.","David Zilberman|Bioeconomy, Innovation, & Environmental Leadership":"Bio = resources + tech + sustainability. Supply chain thinking. Circular. Moorea solutions.\n\nACTION: Supply chain framework per mission.","Kawika Winter|Biocultural Restoration, Stewardship, and Governance":"Social-ecological restoration. He\u2019eia NERR. Ecomimicry: 8 strategies. Loko i\u2019a = \u0101ina momona. Imu increase abundance.\n\nACTION: NERR model for Moorea/Tetiaroa.","Ali Hill|Social License to Operate":"Pyramid: Rejection to Endorsement. CA: CEQA, environment, community.\n\nACTION: SLO for FP seaweed.","Jane Anderson|Rights and Representation, Including More Than Human":"Non-human rights. Local Contexts Labels.\n\nACTION: Continue for FP.","Mere Takoko|Whales: From Personhood to Indigenous Governance":"Whale personhood. Moananui initiative.","Benoit Stoll & Tobias Fischer|Mapping Research Outputs: Tetiaroa":"1955\u20132025 imagery. 10/13 motu stable. XGBoost + transfer learning. IRD Innovation nominee. Tahuna iti: shift to vegetation to birds.\n\nACTION: Pipeline across FP atolls.","John Marchioni|Documenting Research Compliance":"BBNJ SBI. Trust is local. Sealed envelopes.\n\nACTION: Evaluate for iPlaces.","Warren Essey|Accelerating Research to Education":"Kudu: instructor to AI to iteration. KAI assistant. UCLA validated.\n\nACTION: Kudu for Ocean ELP.","Dave Vieglais|iPlace(s) Data Trust":"Contextual collapse. Submit to review to consent to DOI to track. Phases 2025\u20132027.\n\nACTION: Gump pilot.","Hinano Murphy|Atitia Center \u2014 20 Years":"Trust took 5 years. Tahitian bridge. Ite deodora \u2014 knowledge must be lived.","Alex Kusenko|Measuring AI & Math Interventions":"UCLA/UCSD validation. Improved engagement.","Vainui Marakai|Educational Marine Areas":"29 zones, 2,500+ students. Know/Live/Transmit. France: 200,000+.\n\nACTION: Connect EMA with iPlaces.","Ali Hill|Workforce Development: California Lessons":"Baby carrot innovation. Circularity. Place-based design.\n\nACTION: Baby carrot thinking for seaweed.","Tchiou, White Davies & Lison de Loma|Ocean ELP":"No Pacific ocean program exists. 10\u201314 days Moorea. South\u2013South learning.\n\nACTION: Curriculum and funding.","Lolo Kleykamp|Measuring Impact":"ToC: inputs to outputs to outcomes to impact. Promise outputs, not outcomes.\n\nACTION: Each team complete ToC.","Stanley Rowland & Frank Murphy|Tetiaroa CASUP: The First 10 Years":"Surveys: French 11 vs English 29. PRESERVE/INTEGRATE/FILL GAPS.\n\nACTION: Address priority gaps.","Tj Tate|CASUP 2.0: The Next 10 Years":"Committee: Rowland/Tate. Review to timeline.\n\nACTION: Establish work plan.","Alex Wegmann|Palmyra":"Rat eradication 2011. Coconut removal 75%. Grayback terns breeding. Guam Kingfisher: 9 birds.","Jean Wenc\u00e9lius & Tamatoa Bambridge|Tereheamanu":"Pilot 2025. Citizen consultation: water, energy, health, food.\n\nACTION: Action plan.","Megan Donahue & Michael Bruno|Hawai\u2019i":"HIMB. PI turnover = data chaos. Trust varies.\n\nACTION: Automated tracking.","Alex Mawyer|From Transects to Knowledge Transects":"FAIR+CARE. Ridge-to-reef. 4Site to N-Site. Planetary sapience.\n\nACTION: Minimum standards.","Richard Bailey|Honu Submarine Sea Station":"Two HOVs, 1,200m. Mobile platform.\n\nACTION: Feasibility study.","Hinano Murphy|Voice of the Ocean":"Indigenous ocean stewardship. Fa\u2019e octopus. ISA deep-sea mining.","Mere Takoko|Moananui: Indigenous-Led Marine Sanctuaries":"Indigenous governance. Alternatives to state regimes.","Hetereki Huke|Traditional Council Rapa Nui":"Te Mau Hatu o Rapa Nui. Sovereignty reclamation. Repatriation.","Mary Therese Hattori|Pacific Islands Development Program":"PIDP since 1980. CROP/PICL 20 entities.\n\nACTION: Connect with networks.","Bambridge, Mawyer, Wenc\u00e9lius et al.|Mapping Indigenous Seas":"WDPA: 6 points vs 252 actual, 27,413 km\u00b2. Illegibility structural.\n\nACTION: Map all FP areas.\nACTION: Update WDPA."};
