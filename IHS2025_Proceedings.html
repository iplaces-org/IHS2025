var EXEC="The 2nd Island Health and Sustainability Conference convened from 18 to 20 November 2025 at the UC Berkeley Gump South Pacific Research Station in Moorea, French Polynesia. Organized under the auspices of RESIPOL, the French Polynesian Research, Higher Education, and Innovation Consortium, the conference brought together over 50 participants from local institutions, Pacific Island communities, and international research organizations to advance collaborative research addressing urgent sustainability challenges facing island social-ecological systems.\\n\\nBuilding on the inaugural 2024 conference, this second edition focused on translating scientific knowledge into actionable strategies aligned with French Polynesia’s Climate Plan and Innovation Strategy. The conference was structured around four interconnected missions: food systems transformation, renewable energy development through seaweed bioeconomy, land-sea resilience, and public health through elimination of vector-borne disease. These missions served as organizing frameworks for three days of keynotes, panel sessions, breakout discussions, and collaborative project development.\\n\\nDay 1, themed “Island Bioeconomies: From Missions to Markets,” opened with a keynote by Nils Gilman of the Berggruen Institute on planetary governance, followed by presentations from each RESIPOL member institution. Sessions explored the blue bioeconomy, including seaweed diversity, oyster aquaculture, biofuel life-cycle assessment, and blue carbon market standards. Breakout sessions allowed participants to develop mission-specific action plans.\\n\\nDay 2, “Communities of Inquiry,” examined the governance, educational, and social infrastructures needed to support island sustainability. A keynote by David Zilberman on bioeconomy and innovation was followed by sessions on biocultural stewardship, social license to operate, scholarly publication ethics, and educational programs including the Marine Educational Areas model and the proposed Ocean Environmental Leadership Program. The Social Capital Foundation led a workshop on impact measurement using theory-of-change frameworks.";
var PS={"Island Earth: Governing in the Planetary Age":"Gilman presented the central thesis of his book, co-authored with Jonathan S. Blake, arguing that existing governance structures rooted in 17th-century concepts of state sovereignty are inadequate for addressing planetary-scale challenges. He introduced the concept of planetary sapience and proposed functional sovereign entities operating across national boundaries on specific issues, citing the IAEA as precedent. He advocated for multi-species flourishing as an ethical ideal and highlighted small islands like Moorea as laboratories for new governance approaches.","Innovative Approaches to Vector-Borne Disease":"Bossin presented ILM's work on controlling mosquito-borne diseases in French Polynesia, where dengue, Zika, and chikungunya remain persistent threats. He outlined the Sterile Insect Technique and related genetic approaches being developed to suppress Aedes aegypti populations through the PacSIT WHO-sponsored program across Tetiaroa, Papara, and the Cook Islands.","Exploring Tropical Seaweed Diversity":"Zubia presented a comprehensive overview of tropical seaweed diversity in French Polynesia, which harbors approximately 531 species. She emphasized that tropical seaweeds are among the least-studied marine organisms, highlighted their cultural significance in Pacific traditions, and described multi-marker DNA barcoding across French overseas territories. Research on bioactive compounds showed applications in nutraceuticals, cosmetics, and biostimulants for agriculture.","Te Ora Fenua | Te Mauri Ora":"Correa presented her program on coral reef health and marine biodiversity research, emphasizing the integration of genomics and environmental monitoring. She discussed the importance of working with local communities and ethical considerations of genomic data collection, noting collaboration with Jane Anderson on data governance frameworks.","Advancing Tropical Oyster Farming":"Monaco presented IFREMER's work on sustainable oyster aquaculture. He highlighted that 80% of food is imported to FP with over 50% of emissions from transport. Two native species were identified genetically, with S. echinata reaching commercial size in 16 months. A solar-tide system combats Polydora parasite infestation, and the species show high climate change resilience.","Zone Atelier FP":"Bambridge presented the Zone Atelier French Polynesia program, a long-term social-ecological research initiative under the CNRS framework focusing on the interplay between social and ecological dynamics across archipelagos, with emphasis on traditional governance systems (rahui) and contemporary marine management.","Biodiversity Strategy for FP":"Ducatez presented the urgent case for a comprehensive biodiversity strategy, noting that 8.5% of all bird species extinct globally over 500 years were French Polynesian endemics. He analyzed failures of global targets and argued for locally adapted, measurable objectives, outlining a prioritization framework balancing impact, importance, and feasibility.","Eliminating Mosquito-Borne Disease":"Montell presented genetic research improving the Sterile Insect Technique. His lab identified the trpVa gene as critical for mating — mutant males are deaf and unable to fertilize females. Impairing vision paradoxically increases male competitiveness. He also presented IR007, a safe natural repellent providing over 12 hours of protection.","Land-Sea Resilience":"Bambridge and Ducatez presented the Land-Sea Resilience mission focusing on 124 islands with 4,500 km of coastline. A workshop with 50 participants identified 39 long-term monitoring programs and 11 databases. Future directions include COCOPOL, a multi-million-euro program on contaminants in the land-sea continuum.","Transforming Island Food Systems by 2030":"Lison de Loma presented a 5–10 year food systems mission aligned with FP's strategic development agenda, addressing import dependency, climate instability, and fragmented value chains. Target sectors are schools and tourism, with foundations in organic certification, responsible fisheries, and public health nutrition.","Decarbonizing FP Using Seaweed":"Correa mapped the potential for seaweed-based biofuels to displace FP's approximately 350 million liters of annual fossil fuel imports, outlining how macroalgae cultivation could produce biofuels with lower carbon intensity while avoiding land-use conflicts.","International Bioeconomy & Macroalgae Center":"Coates presented the vision for an international bioeconomy center focused on macroalgae, drawing lessons from Indonesia as the world's leading tropical seaweed producer. He connected upstream production challenges to downstream biorefinery concepts including biofuels, bioplastics, and food products.","Blue Natural Capital":"Takoko introduced blue natural capital through whale conservation, discussing the ecological and economic value of cetacean populations including nutrient cycling and carbon sequestration, and advocated for governance frameworks recognizing marine species' rights and personhood.","Life Cycle Assessment: Biofuel from Macroalgae":"Scolari presented a life-cycle assessment framework for seaweed-based biofuel in FP. Conventional fossil fuels have a carbon intensity of 92–97 gCO₂e/MJ. Marine-feedstock biofuels avoid land-use competition, freshwater requirements, and fertilizer inputs, potentially offering a low-carbon alternative.","Blue Bioeconomy in Aotearoa New Zealand":"Bradly presented New Zealand's experience catalyzing blue economy innovation through a five-stage model. Ventures include Save Our Scallops (combining restoration, aquaculture, and fishery management), ORA Reefs, and Blue Nature Aotearoa ocean leadership mentorship.","Taro and Carbon Sequestration":"Kahn presented archaeological research on traditional taro cultivation systems and their role in carbon sequestration, examining the historical relationship between taro agriculture and marine ecosystems and demonstrating climate co-benefits of traditional Polynesian land management.","Land-Sea Restoration: Coral":"Stewart presented Coral Gardeners' community-driven coral restoration work on Moorea, connecting reef rehabilitation with local livelihoods and tourism.","Marine Resources and Island Innovation":"Lo presented FP's fisheries management perspective and innovation strategies, connecting government policy frameworks to the conference's bioeconomy themes.","Blue Carbon Market Standards":"Conte presented blue carbon market standards, examining frameworks for valuing and trading credits from marine and coastal ecosystems as potential financing mechanisms for island sustainability.","Bioeconomy, Innovation, & Environmental Leadership":"Zilberman provided a comprehensive bioeconomy framework distinguishing three elements: natural resources for food/fuel/chemicals, modern technologies, and sustainable development. He categorized bioeconomy types and emphasized that it is built supply chain by supply chain, with constraints spanning technological, economic, policy, environmental, social, and geopolitical dimensions.","Biocultural Restoration, Stewardship, and Governance":"Winter presented biocultural restoration focusing on social-ecological systems. Drawing on He'eia NERR in Hawai'i, he demonstrated how Indigenous practices constitute ecomimicry — habitat engineering and trophic management producing sustainable abundance. Historical evidence shows Indigenous aquaculture increased reef fish abundance.","Social License to Operate":"Hill presented SLO research in California's seaweed sector, using a pyramid from rejection to endorsement. Three barriers identified: regulatory/permitting challenges, environmental uncertainty, and community acceptance. She provided strategies for building legitimacy through stakeholder engagement.","Rights and Representation, Including More Than Human":"Anderson addressed legal and ethical frameworks for recognizing rights of nature and non-human entities, discussing the Local Contexts initiative and its Traditional Knowledge and Biocultural Labels for Indigenous data sovereignty.","Whales: From Personhood to Indigenous Governance":"Takoko discussed the movement toward legal personhood for whales and how Indigenous Pacific governance frameworks provide models for non-human rights recognition, presenting the Moananui initiative for Indigenous-led marine sanctuaries.","Mapping Research Outputs: Tetiaroa":"Stoll and Fischer presented geospatial research on Tetiaroa including new equipment and 1955–2025 satellite imagery. Their analysis found 10/13 motu stable with no warming effect detected. Fischer presented an XGBoost ML pipeline for automated shoreline extraction with cross-atoll transfer learning.","Documenting Research Compliance":"Marchioni presented compliance approaches for the UN BBNJ treaty, proposing that the Standard Batch Identifier system should leverage existing local systems using sealed envelopes of metadata that preserve local control while providing integrity for relying parties.","Accelerating Research to Education":"Essey presented Kudu's AI-powered educational platform replacing textbooks with human-AI co-created content. UCLA's first AI-curated course demonstrated improved engagement. Future developments include KAI, a course-specific assistant for instant feedback and individualized content.","iPlace(s) Data Trust":"Vieglais presented the iPlaces Alliance addressing contextual collapse — where research outputs lose connection to place. The platform tracks applications, facilitates stakeholder dialogue, links outputs back to place, and supports Indigenous governance through Local Context Labels.","Atitia Center — 20 Years":"Murphy presented the Atitia Center's two-decade journey preserving and transmitting Polynesian cultural knowledge through educational programs integrating traditional ecological knowledge with contemporary science.","Measuring AI & Math Interventions":"Kusenko presented independent validation of AI-powered learning tools, demonstrating improved student engagement and outcomes.","Educational Marine Areas":"Marakai presented the EMA program born in FP in 2012, now including 29 zones, 31 schools, 2,500+ students across four archipelagos. Built on knowing, living, and transmitting. Since 2016 expanded to France with 200,000+ students.","Workforce Development: California Lessons":"Hill drew lessons from California's agricultural sector using the baby carrot innovation story to show how new product forms transform industries, and discussed circularity where farm waste becomes revenue streams.","Ocean ELP":"The team presented the proposed Ocean ELP extending Berkeley's 25-year Beahrs program to the Pacific, anchored in Moorea, building capacity among mid-career island and ocean leaders. It addresses a gap in ocean-focused, Pacific-grounded leadership training.","Measuring Impact":"Kleykamp led a workshop on impact measurement from a funder's perspective, introducing theory-of-change frameworks distinguishing inputs, activities, outputs, outcomes, and impact. Participants worked through exercises for the four missions.","Tetiaroa CASUP: The First 10 Years":"Rowland and Murphy reviewed CASUP's first decade as a voluntary conservation plan delegated to a nonprofit. Surveys revealed that local stakeholders emphasized community engagement while international experts focused on funding and enforcement, setting the stage for CASUP 2.0.","CASUP 2.0: The Next 10 Years":"Tate presented CASUP 2.0 planning including steering committee establishment, plan review, survey results, and development timeline building on ten years of lessons.","Palmyra":"Wegmann presented Palmyra's conservation progress: rat eradication, coconut palm removal, seabird habitat restoration, and the reintroduction of Guam Kingfishers extinct in the wild for 35 years.","Tereheamanu":"Wencélius and Bambridge presented the Tereheamanu community of communes in southern Tahiti, a pilot site since 2025. Citizen consultation identified needs spanning water, energy, health, and food sovereignty, envisioning a territory of resilience.","Hawai’i":"Donahue and Bruno presented the Hawaiian 4Site component centered on Coconut Island (HIMB), discussing challenges of coordinating place-based research across institutions.","From Transects to Knowledge Transects":"Mawyer proposed knowledge transects sampling how observations, models, and practices are distributed across islands, disciplines, and communities. Explicitly FAIR and CARE-compliant, anchoring data in place, history, and power relations.","Honu Submarine Sea Station":"Bailey presented the vision for Honu, an innovative underwater research platform advancing marine science capabilities in French Polynesia.","Voice of the Ocean":"Murphy presented on ocean stewardship from an Indigenous Polynesian perspective, emphasizing cultural and spiritual connections between Pacific peoples and the sea.","Moananui: Indigenous-Led Marine Sanctuaries":"Takoko presented the Moananui initiative for Indigenous-led marine sanctuaries as alternatives to state-imposed protection regimes.","Traditional Council Rapa Nui":"Huke presented Rapa Nui's traditional governance systems, tracing authority from pre-contact through colonization to contemporary sovereignty reclamation over marine and terrestrial resources.","Pacific Islands Development Program":"Hattori presented PIDP, which since 1980 has assisted Pacific leaders through capacity building and policy research. As CROP member and PICL secretariat, it connects 20 entities advancing sustainability, gender equality, and cultural practices.","Mapping Indigenous Seas":"Bambridge and Mawyer revealed that WDPA records 6 points (114 km²) for FP while their research found 252 active features totaling 27,413 km². They identified jurisdictional overlap, land-sea overlap, and structural illegibility as fundamental problems, calling for an epistemic shift toward bioculturally-grounded bioeconomies."};
var N={"Nils Gilman|Island Earth: Governing in the Planetary Age":"Key Arguments: (1) human exceptionalism and (2) Westphalian sovereignty both failing. Solutions: planetary subsidiarity; translocal networks (C40); functional institutions (IAEA precedent); multi-species flourishing.\n\nDiscussion: Bailey asked how supranational agencies emerge. Gilman: 75\u201390% compliance transformative; crises drive change.\n\nACTION: Explore Moorea/FP as model for planetary subsidiarity.","Herv\u00e9 Bossin|Innovative Approaches to Vector-Borne Disease":"ILM 76 years. 15 species, 3 invasive cause all disease. SIT industrial facility. PacSIT (WHO): Tetiaroa April 2025, Papara Nov 2025, Cook Islands next. The Brando: premium for mosquito-free.\n\nACTION: Economists for SIT cost modeling.\nACTION: Hawaii avian malaria collaboration.","Mayalen Zubia|Exploring Tropical Seaweed Diversity":"531 species: 320 red, 119 green, 92 brown. 95% funding temperate. >1,000 DNA sequences; herbarium >5,000. Cultural: ho\u2019opono pono. NOT phycocolloids \u2014 Turbinaria alginates, >50 edible species, bioactives, biorefinery. REMU (2024\u20132028). Asparagopsis for methane.\n\nACTION: Spore banking.\nACTION: Sanitary assessments.\nACTION: Innovation funding.","Adrienne Correa|Te Ora Fenua | Te Mauri Ora":"BioCode 2.0: draft genomes 6\u201330 organisms. Schools/communities FIRST. \u2018Rori\u2019 sea cucumber model. Lessons: translator funding, iterative consent.\n\nACTION: Local Contexts labels.\nACTION: Materials in French/Tahitian.","Cristian Monaco & Guillaume Mitta|Advancing Tropical Oyster Farming":"80% food imported; >50% emissions from transport. Two native oysters, 16 months commercial. Solar-tide vs Polydora. Carbon: individual CO\u2082 vs community sequestration.\n\nACTION: Research community-level carbon sequestration.","Tamatoa Bambridge|Zone Atelier FP":"Took 2 years; previous attempts failed. ~100\u2013150 researchers. \u2018S\u2019 (social) key. Covers entire EEZ. Co-designing essential.\n\nACTION: Build network across FP.","Simon Ducatez|Biodiversity Strategy for FP":"14 extinct endemics (8.5% global). 15/26 endemic birds EN/CR. Aichi failed. No measurable FP framework. Prioritize: impact \u00d7 importance \u00d7 feasibility.\n\nACTION: Measurable objectives.\nACTION: Recovery plans with communities.","Craig Montell|Eliminating Mosquito-Borne Disease":"trpVa: deaf males 0% fertilization. Blind males outcompete wild-type. IR007: 3 EPA components, >12h (DEET ~4.5h), <$0.14/oz. VectorFree.\n\nACTION: Montell-Bossin collaboration.","Tamatoa Bambridge & Simon Ducatez|Land-Sea Resilience":"4,500 km coastline, 124 islands. Workshop: 50+6, 27 presentations. 39 programs, 11 databases, 35 actors. COCOPOL: ~\u20ac2M, 5\u20138yr, >30 researchers.\n\nACTION: France-Berkeley Fund.\nACTION: Complete proceedings.","Thierry Lison de Loma|Transforming Island Food Systems by 2030":"5\u201310yr. Schools + tourism. BioPasifika. Full value chain. Participatory democracy via iPlaces.\n\nACTION: Mission timeline.\nACTION: Identify pilot islands.","Thiago Correa|Decarbonizing FP Using Seaweed":"~350M liters fossil fuels. Ethanol ~10% substitution.\n\nACTION: Connect with Zubia and Scolari.","John Coates|International Bioeconomy & Macroalgae Center":"IBMC vision. Indonesia model. Seaweed as circular bioeconomy feedstock.","Mere Takoko|Blue Natural Capital":"Blue natural capital via whales. Nutrient cycling, carbon sequestration. Rights/personhood governance.","David Scolari|Life Cycle Assessment: Biofuel from Macroalgae":"Fossil: ~92\u201397 gCO\u2082e/MJ. Renewables cut conversion 90%+. Co-products displace imports.\n\nACTION: Complete FP-specific LCA.","Nigel Bradly|Blue Bioeconomy in Aotearoa New Zealand":"Origination to Scale. Save Our Scallops with Iwi. ORA Reefs. Blue Nature Aotearoa.\n\nACTION: FP-NZ collaboration.","Jenny Kahn|Taro and Carbon Sequestration":"Traditional taro-marine relationship. Resilient food with climate co-benefits.","Hannah Stewart|Land-Sea Restoration: Coral":"Coral Gardeners Moorea. Community-driven restoration.","Cedrik Lo|Marine Resources and Island Innovation":"Government fisheries. Policy-bioeconomy connection.","Adrien Conte|Blue Carbon Market Standards":"Blue carbon frameworks. Financing for sustainability.\n\nACTION: Evaluate FP ecosystems.","David Zilberman|Bioeconomy, Innovation, & Environmental Leadership":"Bio = resources + tech + sustainability. Supply chain thinking. Circular. Moorea solutions.\n\nACTION: Supply chain framework per mission.","Kawika Winter|Biocultural Restoration, Stewardship, and Governance":"Social-ecological restoration. He\u2019eia NERR. Ecomimicry: 8 strategies. Loko i\u2019a = \u0101ina momona. Imu increase abundance.\n\nACTION: NERR model for Moorea/Tetiaroa.","Ali Hill|Social License to Operate":"Pyramid: Rejection to Endorsement. CA: CEQA, environment, community.\n\nACTION: SLO for FP seaweed.","Jane Anderson|Rights and Representation, Including More Than Human":"Non-human rights. Local Contexts Labels.\n\nACTION: Continue for FP.","Mere Takoko|Whales: From Personhood to Indigenous Governance":"Whale personhood. Moananui initiative.","Benoit Stoll & Tobias Fischer|Mapping Research Outputs: Tetiaroa":"1955\u20132025 imagery. 10/13 motu stable. XGBoost + transfer learning. IRD Innovation nominee. Tahuna iti: shift to vegetation to birds.\n\nACTION: Pipeline across FP atolls.","John Marchioni|Documenting Research Compliance":"BBNJ SBI. Trust is local. Sealed envelopes.\n\nACTION: Evaluate for iPlaces.","Warren Essey|Accelerating Research to Education":"Kudu: instructor to AI to iteration. KAI assistant. UCLA validated.\n\nACTION: Kudu for Ocean ELP.","Dave Vieglais|iPlace(s) Data Trust":"Contextual collapse. Submit to review to consent to DOI to track. Phases 2025\u20132027.\n\nACTION: Gump pilot.","Hinano Murphy|Atitia Center \u2014 20 Years":"Trust took 5 years. Tahitian bridge. Ite deodora \u2014 knowledge must be lived.","Alex Kusenko|Measuring AI & Math Interventions":"UCLA/UCSD validation. Improved engagement.","Vainui Marakai|Educational Marine Areas":"29 zones, 2,500+ students. Know/Live/Transmit. France: 200,000+.\n\nACTION: Connect EMA with iPlaces.","Ali Hill|Workforce Development: California Lessons":"Baby carrot innovation. Circularity. Place-based design.\n\nACTION: Baby carrot thinking for seaweed.","Tchiou, White Davies & Lison de Loma|Ocean ELP":"No Pacific ocean program exists. 10\u201314 days Moorea. South\u2013South learning.\n\nACTION: Curriculum and funding.","Lolo Kleykamp|Measuring Impact":"ToC: inputs to outputs to outcomes to impact. Promise outputs, not outcomes.\n\nACTION: Each team complete ToC.","Stanley Rowland & Frank Murphy|Tetiaroa CASUP: The First 10 Years":"Surveys: French 11 vs English 29. PRESERVE/INTEGRATE/FILL GAPS.\n\nACTION: Address priority gaps.","Tj Tate|CASUP 2.0: The Next 10 Years":"Committee: Rowland/Tate. Review to timeline.\n\nACTION: Establish work plan.","Alex Wegmann|Palmyra":"Rat eradication 2011. Coconut removal 75%. Grayback terns breeding. Guam Kingfisher: 9 birds.","Jean Wenc\u00e9lius & Tamatoa Bambridge|Tereheamanu":"Pilot 2025. Citizen consultation: water, energy, health, food.\n\nACTION: Action plan.","Megan Donahue & Michael Bruno|Hawai\u2019i":"HIMB. PI turnover = data chaos. Trust varies.\n\nACTION: Automated tracking.","Alex Mawyer|From Transects to Knowledge Transects":"FAIR+CARE. Ridge-to-reef. 4Site to N-Site. Planetary sapience.\n\nACTION: Minimum standards.","Richard Bailey|Honu Submarine Sea Station":"Two HOVs, 1,200m. Mobile platform.\n\nACTION: Feasibility study.","Hinano Murphy|Voice of the Ocean":"Indigenous ocean stewardship. Fa\u2019e octopus. ISA deep-sea mining.","Mere Takoko|Moananui: Indigenous-Led Marine Sanctuaries":"Indigenous governance. Alternatives to state regimes.","Hetereki Huke|Traditional Council Rapa Nui":"Te Mau Hatu o Rapa Nui. Sovereignty reclamation. Repatriation.","Mary Therese Hattori|Pacific Islands Development Program":"PIDP since 1980. CROP/PICL 20 entities.\n\nACTION: Connect with networks.","Bambridge, Mawyer, Wenc\u00e9lius et al.|Mapping Indigenous Seas":"WDPA: 6 points vs 252 actual, 27,413 km\u00b2. Illegibility structural.\n\nACTION: Map all FP areas.\nACTION: Update WDPA."};
